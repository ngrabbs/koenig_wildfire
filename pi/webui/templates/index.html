<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Koenig Wildfire</title>
  <style>
    :root { color-scheme: light; }
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           margin: 1.5em; max-width: 1200px; color: #222; }
    h1   { margin: 0 0 0.2em 0; }
    .subtitle { color: #666; margin: 0 0 1.2em 0; font-size: 0.95em; }
    .controls { display: flex; gap: 0.5em; margin-bottom: 1.2em; flex-wrap: wrap; }
    .controls form { margin: 0; }
    button { font-size: 1em; padding: 0.6em 1.1em; cursor: pointer;
             border-radius: 6px; border: 1px solid transparent; }
    button.capture { background: #1f6feb; color: white; border-color: #1f6feb; }
    button.capture:hover { background: #1a5fcc; }
    button.danger  { background: white; color: #c0392b; border-color: #c0392b; }
    button.danger:hover { background: #fdecea; }
    button.delete  { padding: 0.3em 0.7em; font-size: 0.85em; }
    .gallery { display: grid;
               grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
               gap: 1em; }
    .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden;
            background: #fafafa; display: flex; flex-direction: column; }
    .card a.thumb { display: block; background: #000; }
    .card img { width: 100%; height: 160px; object-fit: contain; display: block; }
    .card .meta { padding: 0.5em 0.7em 0.2em; font-size: 0.8em;
                  font-family: ui-monospace, monospace; color: #555;
                  overflow-wrap: anywhere; }
    .card .actions { padding: 0.4em 0.7em 0.7em; }
    .empty { color: #888; font-style: italic; padding: 2em 0; text-align: center; }
  </style>
</head>
<body>
  <h1>Koenig Wildfire</h1>
  <p class="subtitle">Phase 2 spike — single IMX296 camera, click to capture.</p>

  <div class="controls">
    <form action="/capture" method="post">
      <button class="capture" type="submit">Capture</button>
    </form>
    {% if images %}
    <form action="/clear" method="post"
          onsubmit="return confirm('Delete all {{ images|length }} images?');">
      <button class="danger" type="submit">Clear all ({{ images|length }})</button>
    </form>
    {% endif %}
  </div>

  {% if images %}
  <div class="gallery">
    {% for id in images %}
    <div class="card">
      <a class="thumb" href="/img/{{ id }}" target="_blank">
        <img src="/img/{{ id }}" alt="{{ id }}" loading="lazy" />
      </a>
      <div class="meta">{{ id }}</div>
      <div class="actions">
        <form action="/delete/{{ id }}" method="post"
              onsubmit="return confirm('Delete {{ id }}?');">
          <button class="danger delete" type="submit">Delete</button>
        </form>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="empty">No images yet. Click <strong>Capture</strong> to take the first one.</p>
  {% endif %}
</body>
</html>
